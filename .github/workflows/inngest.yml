name: Sync Inngest Functions

on:
  # Run after the Deploy Apps workflow completes
  workflow_run:
    workflows: ["Deploy Apps"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Sync Inngest
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (or if manually/push triggered)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix ci

      - name: Sync Inngest functions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run -w ci ci:jobs
